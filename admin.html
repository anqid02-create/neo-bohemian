<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | BaziChart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e9c349",
              secondary: "#adcbd6",
              bg: "#11131c",
              panel: "#1d1f29",
              line: "#32343e",
              text: "#e1e1ef",
              muted: "#c7c5cc",
              danger: "#ffb4ab",
              ok: "#8cd6b3",
            },
            fontFamily: {
              headline: ["Cormorant Garamond", "serif"],
              body: ["Manrope", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-bg font-body text-text">
    <div class="mx-auto w-full max-w-6xl px-6 py-10">
      <header class="mb-8 flex items-end justify-between border-b border-line pb-6">
        <div>
          <p class="mb-2 text-xs uppercase tracking-[0.3em] text-secondary">Project Admin</p>
          <h1 class="font-headline text-5xl text-primary">BaziChart Console</h1>
        </div>
        <button class="hidden rounded-full border border-line px-5 py-2 text-sm text-secondary hover:text-primary" id="logout-button" type="button">
          Logout
        </button>
      </header>

      <section class="rounded-2xl border border-line bg-panel/80 p-6 md:p-8" id="login-panel">
        <h2 class="mb-5 font-headline text-3xl text-primary">Admin Login</h2>
        <form class="grid gap-4 md:max-w-xl" id="login-form">
          <label class="grid gap-2">
            <span class="text-xs uppercase tracking-[0.24em] text-secondary">Email</span>
            <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="admin-email" required type="email" />
          </label>
          <label class="grid gap-2">
            <span class="text-xs uppercase tracking-[0.24em] text-secondary">Password</span>
            <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="admin-password" required type="password" />
          </label>
          <button class="mt-2 rounded-lg bg-primary px-6 py-3 text-sm font-bold uppercase tracking-[0.2em] text-[#241a00]" type="submit">
            Login
          </button>
        </form>
        <p class="mt-4 hidden rounded-lg border border-danger/30 bg-danger/10 px-4 py-3 text-sm text-danger" id="login-error"></p>
      </section>

      <section class="hidden space-y-8" id="dashboard-panel">
        <article class="rounded-2xl border border-line bg-panel/80 p-6 md:p-8">
          <div class="mb-5 flex items-center justify-between">
            <h2 class="font-headline text-3xl text-primary">Payment Settings</h2>
            <button class="rounded-lg border border-line px-4 py-2 text-xs uppercase tracking-[0.2em] text-secondary hover:text-primary" id="refresh-settings" type="button">
              Refresh
            </button>
          </div>
          <form class="grid gap-4 md:grid-cols-2" id="settings-form">
            <label class="grid gap-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">PayPal Enabled</span>
              <select class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-enabled">
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </label>
            <label class="grid gap-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Mode</span>
              <select class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-mode">
                <option value="sandbox">sandbox</option>
                <option value="live">live</option>
              </select>
            </label>
            <label class="grid gap-2 md:col-span-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Client ID</span>
              <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-client-id" type="text" />
            </label>
            <label class="grid gap-2 md:col-span-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Client Secret</span>
              <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-client-secret" type="text" />
            </label>
            <label class="grid gap-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Currency</span>
              <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-currency" type="text" />
            </label>
            <label class="grid gap-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Amount</span>
              <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-amount" type="text" />
            </label>
            <label class="grid gap-2">
              <span class="text-xs uppercase tracking-[0.24em] text-secondary">Intent</span>
              <input class="rounded-lg border border-line bg-bg/80 px-4 py-3 text-text focus:border-primary focus:outline-none" id="paypal-intent" type="text" />
            </label>
          </form>
          <div class="mt-5 flex flex-wrap items-center gap-3">
            <button class="rounded-lg bg-primary px-5 py-3 text-xs font-bold uppercase tracking-[0.2em] text-[#241a00]" id="save-settings" type="button">
              Save Settings
            </button>
            <p class="hidden rounded-lg border border-ok/30 bg-ok/10 px-4 py-2 text-sm text-ok" id="settings-ok"></p>
            <p class="hidden rounded-lg border border-danger/30 bg-danger/10 px-4 py-2 text-sm text-danger" id="settings-error"></p>
          </div>
        </article>

        <article class="rounded-2xl border border-line bg-panel/80 p-6 md:p-8">
          <div class="mb-5 flex items-center justify-between">
            <h2 class="font-headline text-3xl text-primary">Orders</h2>
            <button class="rounded-lg border border-line px-4 py-2 text-xs uppercase tracking-[0.2em] text-secondary hover:text-primary" id="refresh-orders" type="button">
              Refresh
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full min-w-[760px] border-separate border-spacing-y-2 text-sm">
              <thead>
                <tr class="text-left text-xs uppercase tracking-[0.18em] text-secondary">
                  <th class="px-3 py-2">Order ID</th>
                  <th class="px-3 py-2">Status</th>
                  <th class="px-3 py-2">Amount</th>
                  <th class="px-3 py-2">Mode</th>
                  <th class="px-3 py-2">Email</th>
                  <th class="px-3 py-2">Created</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
          <p class="mt-3 hidden rounded-lg border border-danger/30 bg-danger/10 px-4 py-2 text-sm text-danger" id="orders-error"></p>
        </article>
      </section>
    </div>

    <script src="./admin.js"></script>
  </body>
</html>
